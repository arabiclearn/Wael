<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wael | GitHub Pages</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid #a78bfa;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    p.subtitle {
      font-size: 1.2rem;
      color: #c4b5fd;
      margin-bottom: 2rem;
    }
    .badge {
      display: inline-block;
      background: rgba(167, 139, 250, 0.15);
      border: 1px solid #a78bfa;
      color: #a78bfa;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.9rem;
      margin: 0.3rem;
    }
    .links {
      margin-top: 2rem;
    }
    .links a {
      display: inline-block;
      margin: 0.5rem;
      padding: 0.7rem 1.8rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .links a:hover { transform: translateY(-2px); }
    .btn-primary {
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      color: #fff;
    }
    .btn-secondary {
      background: transparent;
      border: 2px solid #a78bfa;
      color: #a78bfa;
    }
    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="avatar" src="https://avatars.githubusercontent.com/u/295520309?v=4" alt="arabiclearn avatar" />
    <h1>Wael</h1>
    <p class="subtitle">Welcome to my GitHub Pages site</p>
    <div>
      <span class="badge">GitHub</span>
      <span class="badge">Open Source</span>
      <span class="badge">Developer</span>
    </div>
    <div class="links">
      <a class="btn-primary" href="https://github.com/arabiclearn" target="_blank">View GitHub Profile</a>
      <a class="btn-secondary" href="https://github.com/arabiclearn/Wael" target="_blank">View Repository</a>
    </div>
    <footer>Hosted on GitHub Pages &mdash; arabiclearn/Wael</footer>
  </div>
</body>
</html>
